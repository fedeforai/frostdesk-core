<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
  <!-- Outer ring - sky blue -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#5B9BD5" stroke-width="6"/>
  <!-- Inner circle (clip / background) -->
  <circle cx="50" cy="50" r="42" fill="white"/>
  <!-- Mountain: left face - lighter blue -->
  <path d="M 22 78 L 50 22 L 50 78 Z" fill="#6BA3D8"/>
  <!-- Mountain: right face - navy -->
